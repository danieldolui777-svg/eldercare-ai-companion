[build]
builder = "nixpacks"
buildCommand = "pnpm install --prod=false && pnpm --filter @eldercare/domain build && pnpm --filter @eldercare/config build && pnpm --filter @eldercare/ai-providers build && pnpm --filter @eldercare/api exec prisma generate && pnpm --filter @eldercare/api build"

[deploy]
startCommand = "pnpm --filter @eldercare/api exec prisma migrate deploy && node /app/apps/api/dist/apps/api/src/main.js"
restartPolicyType = "on_failure"
